  <style>
    body { 
      margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      background-color: #000; color: #fff; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden;
    }

    /* 【黄色のキャンペーン帯】 */
    .campaign-banner {
      background: #ffda00; color: #000; font-weight: 900; font-size: 13px;
      padding: 10px 0; text-align: center; border-bottom: 2px solid #000;
      box-shadow: 0 4px 15px rgba(255, 218, 0, 0.4);
    }

    .header-bar { 
      background: #111; border-bottom: 2px solid #1d9bf0; padding: 16px; text-align: center; 
      font-weight: bold; font-size: 16px;
    }

    .login-tag {
      background: #1d9bf0; color: #fff; padding: 6px 18px; border-radius: 25px; 
      margin-left: 10px; font-size: 14px; display: inline-block;
      animation: smooth-glow 1.5s infinite alternate;
    }
    @keyframes smooth-glow {
      from { box-shadow: 0 0 5px rgba(29, 155, 240, 0.5); transform: scale(1); }
      to { box-shadow: 0 0 20px rgba(29, 155, 240, 0.8); transform: scale(1.05); }
    }

    .main-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    
    .news-card {
      background: #161616; border: 1px solid #2f3336; border-radius: 20px; padding: 28px; 
      max-width: 450px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.8); text-align: left;
    }
    .badge {
      display: inline-block; background: #fff; color: #000; font-size: 12px; 
      font-weight: bold; padding: 4px 12px; border-radius: 6px; margin-bottom: 15px;
    }
    .news-title { font-size: 24px; font-weight: 900; line-height: 1.4; margin: 0 0 12px 0; }
    .news-desc { color: #8899a6; font-size: 15px; margin-bottom: 25px; }

    .loading-info { 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 15px; padding: 25px; background: rgba(255,255,255,0.05); border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .spinner {
      border: 4px solid #333; border-top: 4px solid #fff; border-radius: 50%;
      width: 32px; height: 32px; animation: spin 0.8s linear infinite;
    }
    .loading-text { font-size: 18px; font-weight: bold; color: #ffda00; text-align: center; }
    .sub-text { font-size: 14px; color: #8899a6; margin-top: 5px; }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <script>

    const displayTime = 1200; // 1.2秒で転送
